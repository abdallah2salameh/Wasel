spring.datasource.url=jdbc:h2:mem:wasel;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true

app.bootstrap.seed-admin=false
app.integration.routing.enabled=false
app.integration.weather.enabled=false
