spring.application.name=wasel-palestine-backend

server.port=${SERVER_PORT:8080}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/wasel}
spring.datasource.username=${DB_USERNAME:wasel}
spring.datasource.password=${DB_PASSWORD:wasel}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.jackson.serialization.write-dates-as-timestamps=false

management.endpoints.web.exposure.include=health,info

springdoc.swagger-ui.path=/swagger-ui
springdoc.api-docs.path=/v3/api-docs

app.bootstrap.seed-admin=${APP_BOOTSTRAP_SEED_ADMIN:true}
app.bootstrap.admin-email=${APP_BOOTSTRAP_ADMIN_EMAIL:admin@wasel.local}
app.bootstrap.admin-password=${APP_BOOTSTRAP_ADMIN_PASSWORD:ChangeMe123!}

app.jwt.secret=${APP_JWT_SECRET:VGhpc0lzQVNlY3VyZUZvckRldk9ubHlTZWNyZXRLZXlGb3JXYXNlbDEyMw==}
app.jwt.access-token-minutes=${APP_JWT_ACCESS_MINUTES:30}
app.jwt.refresh-token-days=${APP_JWT_REFRESH_DAYS:7}

app.integration.routing.enabled=${ROUTING_ENABLED:true}
app.integration.routing.base-url=${ROUTING_BASE_URL:https://router.project-osrm.org}
app.integration.routing.geocoding-url=${GEOCODING_BASE_URL:https://nominatim.openstreetmap.org}
app.integration.routing.requests-per-minute=${ROUTING_REQUESTS_PER_MINUTE:60}
app.integration.routing.connect-timeout-seconds=${ROUTING_CONNECT_TIMEOUT_SECONDS:5}
app.integration.routing.read-timeout-seconds=${ROUTING_READ_TIMEOUT_SECONDS:8}

app.integration.weather.enabled=${WEATHER_ENABLED:false}
app.integration.weather.base-url=${WEATHER_BASE_URL:https://api.openweathermap.org}
app.integration.weather.api-key=${WEATHER_API_KEY:}
app.integration.weather.requests-per-minute=${WEATHER_REQUESTS_PER_MINUTE:30}
app.integration.weather.connect-timeout-seconds=${WEATHER_CONNECT_TIMEOUT_SECONDS:5}
app.integration.weather.read-timeout-seconds=${WEATHER_READ_TIMEOUT_SECONDS:8}
