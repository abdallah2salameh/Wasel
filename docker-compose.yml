services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: wasel
      POSTGRES_USER: wasel
      POSTGRES_PASSWORD: wasel
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wasel -d wasel"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ./wasel-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/wasel
      DB_USERNAME: wasel
      DB_PASSWORD: wasel
      APP_BOOTSTRAP_ADMIN_EMAIL: admin@wasel.local
      APP_BOOTSTRAP_ADMIN_PASSWORD: ChangeMe123!
      APP_JWT_SECRET: VGhpc0lzQVNlY3VyZUZvckRldk9ubHlTZWNyZXRLZXlGb3JXYXNlbDEyMw==
      WEATHER_ENABLED: "false"
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./wasel-ui
    depends_on:
      app:
        condition: service_started
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
    ports:
      - "3000:3000"

volumes:
  postgres_data:
